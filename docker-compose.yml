# NEOGEN - orchestration du service API
#
# ATTENTION SECURITE : ce service monte le socket Docker de l'hote pour pouvoir
# creer les conteneurs-bacs-a-sable du code genere. Cela donne au conteneur de
# l'API un controle root-equivalent du Docker hote.
#   -> A LANCER SUR UNE MACHINE DEDIEE UNIQUEMENT.
#   -> JAMAIS sur le VPS de production (187.124.36.81 / netroia.tech / n8n).
#
# Prerequis sur l'hote : Docker, et l'image de bac a sable presente :
#   docker pull python:3.12-slim
#
# Lancement :
#   ANTHROPIC_API_KEY=sk-ant-... docker compose up --build
# (ou definir ANTHROPIC_API_KEY dans un fichier .env a cote, non commite)

services:
  neogen-api:
    build: .
    container_name: neogen-api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEOGEN_BASE_URL=${NEOGEN_BASE_URL:-http://localhost:8000}
      # === INSTANCE PROPRIETAIRE (Jordan) : version ULTIME, toutes capacites debloquees ===
      # NE JAMAIS mettre a 1 sur le deploiement PUBLIC : le paywall y reste pour les utilisateurs.
      # Sur le public, definir NEOGEN_OWNER_UNLIMITED=0 (et retirer NEOGEN_ALLOW_DEFAULT_KEY).
      - NEOGEN_OWNER_UNLIMITED=${NEOGEN_OWNER_UNLIMITED:-0}
      - NEOGEN_ALLOW_DEFAULT_KEY=${NEOGEN_ALLOW_DEFAULT_KEY:-0}
      # Email owner : palier enterprise apres login (protection = login) + email reserve a l'inscription
      - NEOGEN_OWNER_EMAIL=${NEOGEN_OWNER_EMAIL:-}
      # Secret de maintenance (correction de donnees sans SSH) — vide = endpoint desactive (fail-closed)
      - NEOGEN_MAINTENANCE_SECRET=${NEOGEN_MAINTENANCE_SECRET:-}
      # Base Ollama (mode eco) : host.docker.internal marche sur Docker Desktop (Mac/Windows),
      # jamais sur Linux -> surcharger via .env avec l'IP de la passerelle du reseau compose.
      - NEOGEN_OLLAMA_BASE=${NEOGEN_OLLAMA_BASE:-http://host.docker.internal:11434/v1}
    volumes:
      # socket Docker : permet de lancer les conteneurs durcis du code genere
      - /var/run/docker.sock:/var/run/docker.sock
      # persistance des produits fabriques (registre + code) sur l'hote
      - ./data:/app/data
      # code interface du proprietaire (forge UI Python) : ecrit par le conteneur, persiste
      # sur l'hote -> versionnable git, survit aux rebuild (vrai "permanent")
      - ./ui_custom.py:/app/ui_custom.py
      # credentials en lecture seule (Stripe, OpenLegi...) — jamais copiees dans l'image
      - ../credentials:/app/credentials:ro
    restart: unless-stopped
